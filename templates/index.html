<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Office — Цифровой офис</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────────────── */
        .header {
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #333;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .badge {
            background: #4ade80;
            color: #000;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* ── Main layout ────────────────────────────────────────── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar: агенты ────────────────────────────────────── */
        .sidebar {
            width: 220px;
            background: #16162a;
            border-right: 1px solid #2a2a4a;
            padding: 16px 0;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            padding: 0 16px 12px;
            letter-spacing: 1px;
        }
        .agent-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.15s;
        }
        .agent-btn:hover { background: #1e1e3a; color: #fff; }
        .agent-btn.active {
            background: #2a1b4a;
            color: #a78bfa;
            border-left: 3px solid #a78bfa;
        }
        .agent-btn .icon { font-size: 18px; }
        .agent-btn .info { display: flex; flex-direction: column; }
        .agent-btn .name { font-weight: 500; }
        .agent-btn .desc { font-size: 11px; color: #666; }

        /* ── Chat area ──────────────────────────────────────────── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            background: #1a1a30;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header .agent-name { font-weight: 600; font-size: 15px; }
        .chat-header .agent-model {
            font-size: 11px;
            color: #666;
            background: #2a2a4a;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .msg.user .avatar { background: #3b82f6; }
        .msg.agent .avatar { background: #6d28d9; }
        .msg .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .msg.user .bubble { background: #1e3a6e; border-bottom-right-radius: 4px; }
        .msg.agent .bubble { background: #2a1b4a; border-bottom-left-radius: 4px; }
        .msg .meta { font-size: 10px; color: #555; margin-top: 4px; }

        /* ── Typing indicator ───────────────────────────────────── */
        .typing { display: none; align-items: center; gap: 8px; padding: 0 20px; }
        .typing.visible { display: flex; }
        .typing .dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Input area ─────────────────────────────────────────── */
        .input-area {
            padding: 16px 20px;
            background: #1a1a30;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            background: #0f0f23;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }
        .input-area textarea:focus { outline: none; border-color: #6d28d9; }
        .send-btn {
            background: linear-gradient(135deg, #6d28d9, #7c3aed);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Welcome screen ─────────────────────────────────────── */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #555;
        }
        .welcome h2 { font-size: 24px; color: #a78bfa; }
        .welcome p { font-size: 14px; max-width: 400px; text-align: center; }
        .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .quick-btn {
            background: #1e1e3a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 14px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .quick-btn:hover { background: #2a1b4a; color: #fff; border-color: #6d28d9; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏢 AI Office</h1>
    <span class="badge">v1.0</span>
    <span style="color:#666; font-size:13px; margin-left:8px;">Цифровой офис с 7 ИИ-агентами</span>
</div>

<div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-title">Агенты</div>
        {% for agent in agents %}
        <button class="agent-btn {% if loop.first %}active{% endif %}"
                data-agent="{{ agent.id }}"
                onclick="selectAgent('{{ agent.id }}', '{{ agent.name }}', '{{ agent.icon }}')">
            <span class="icon">{{ agent.icon }}</span>
            <span class="info">
                <span class="name">{{ agent.name }}</span>
                <span class="desc">{{ agent.desc }}</span>
            </span>
        </button>
        {% endfor %}
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <span id="current-icon">📋</span>
            <span class="agent-name" id="current-agent-name">PMO</span>
            <span class="agent-model" id="current-model">Оркестратор</span>
        </div>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>Добро пожаловать в AI Office</h2>
                <p>Выберите агента слева и отправьте ему задачу. PMO может декомпозировать любую задачу и маршрутизировать к нужному специалисту.</p>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickSend('Проанализируй данные продаж за Q1 2026')">📊 Анализ данных</button>
                    <button class="quick-btn" onclick="quickSend('Напиши статью про искусственный интеллект')">✍️ Написать статью</button>
                    <button class="quick-btn" onclick="quickSend('Сделай ревью кода на Python')">💻 Code Review</button>
                    <button class="quick-btn" onclick="quickSend('Проанализируй рынок SaaS')">🎯 Анализ рынка</button>
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            <div class="dots"><span></span><span></span><span></span></div>
            <span style="color:#666; font-size:13px;">Агент думает...</span>
        </div>

        <div class="input-area">
            <textarea id="msg-input"
                      placeholder="Опишите задачу..."
                      rows="1"
                      onkeydown="handleKey(event)"
                      oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    let currentAgent = 'pmo';
    let currentAgentName = 'PMO';
    let currentIcon = '📋';
    let isLoading = false;

    const agentModels = {
        pmo: 'OpenAI GPT-4o mini',
        data_analyst: 'OpenAI GPT-4o mini',
        developer: 'OpenAI GPT-4o mini → GPT-4o',
        copywriter: 'OpenAI GPT-4o mini',
        support: 'OpenAI GPT-4o mini → GPT-4o',
        strategist: 'OpenAI GPT-4o mini',
        accountant: 'OpenAI GPT-4o mini → GPT-4o',
    };

    function selectAgent(id, name, icon) {
        currentAgent = id;
        currentAgentName = name;
        currentIcon = icon;

        document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-agent="${id}"]`).classList.add('active');

        document.getElementById('current-agent-name').textContent = name;
        document.getElementById('current-icon').textContent = icon;
        document.getElementById('current-model').textContent = agentModels[id] || '';
    }

    function quickSend(text) {
        document.getElementById('msg-input').value = text;
        sendMessage();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addMessage(role, text, meta = '') {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const div = document.createElement('div');
        div.className = `msg ${role}`;
        const avatar = role === 'user' ? '👤' : currentIcon;
        div.innerHTML = `
            <div class="avatar">${avatar}</div>
            <div>
                <div class="bubble">${escapeHtml(text)}</div>
                ${meta ? `<div class="meta">${meta}</div>` : ''}
            </div>
        `;
        const msgs = document.getElementById('messages');
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        addMessage('user', text);
        document.getElementById('typing').classList.add('visible');

        try {
            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agent_id: currentAgent, message: text }),
            });
            const data = await resp.json();

            if (data.status === 'ok') {
                addMessage('agent', data.result, `task: ${data.task_id}`);
            } else {
                addMessage('agent', `❌ Ошибка: ${data.error}`, '');
            }
        } catch (err) {
            addMessage('agent', `❌ Ошибка соединения: ${err.message}`, '');
        }

        document.getElementById('typing').classList.remove('visible');
        document.getElementById('send-btn').disabled = false;
        isLoading = false;
        input.focus();
    }
</script>

</body>
</html>
