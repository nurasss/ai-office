# ─── Конфигурация агентов ─────────────────────────────────────────────
agents:
  pmo:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.1
    max_tokens: 4096
    max_iterations: 10
    rag_namespace: agent_pmo

  data_analyst:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.0
    max_tokens: 8192
    self_verification: true
    max_verification_rounds: 3
    rag_namespace: agent_data_analyst

  developer:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.1
    max_tokens: 8192
    rag_namespace: agent_developer

  copywriter:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.3
    max_tokens: 4096
    rag_namespace: agent_copywriter

  support:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.1
    max_tokens: 4096
    escalation_threshold: 0.7  # confidence threshold для L1→L2
    rag_namespace: agent_support

  strategist:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.2
    max_tokens: 8192
    rag_namespace: agent_strategist

  accountant:
    model_provider: openai
    model_default: gpt-4o-mini
    model_heavy: gpt-4o
    temperature: 0.0
    max_tokens: 4096
    zero_hallucination: true
    math_audit_rounds: 2
    rag_namespace: agent_accountant

# ─── Оркестратор ─────────────────────────────────────────────────────
orchestrator:
  max_graph_iterations: 50
  recursion_limit: 100

# ─── RAG ─────────────────────────────────────────────────────────────
rag:
  chunk_size: 1024
  chunk_overlap: 128
  top_k: 3
  vector_store: pgvector  # pgvector | pinecone
  common_namespace: common_corporate
  include_common_namespace: true
  enforce_agent_namespaces: true

# ─── Long-term memory ────────────────────────────────────────────────
memory:
  enabled: true
  storage_path: data/memory
  max_events_per_context: 2
  max_events_per_agent: 200
  record_successes: true
  shared_incident_namespace: common_incidents
